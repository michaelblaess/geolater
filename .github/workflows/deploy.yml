name: Deploy zu GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Bauen
        run: npm run build

      - name: Build-Artefakte hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deployen
        id: deploy
        uses: actions/deploy-pages@v4
