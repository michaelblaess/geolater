<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="geolater — kostenloses GeoGuessr-ähnliches Browser-Spiel" />
    <title>geolater</title>
    <script>
      // Theme aus localStorage so frueh wie moeglich anwenden, damit kein Flash entsteht
      (function () {
        try {
          var saved = localStorage.getItem("geolater:theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = saved === "dark" || (saved === null && prefersDark);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-stone-50 text-stone-900 dark:bg-stone-950 dark:text-stone-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
