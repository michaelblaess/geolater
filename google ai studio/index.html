<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoLater - Errate die Welt</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://unpkg.com/mapillary-js@4.1.2/dist/mapillary.css" rel="stylesheet" />
    <style>
      @import "https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap";
      
      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --bg: #0f172a;
        --card-bg: #1e293b;
        --text: #f8fafc;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text);
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      #game-container {
        position: relative;
        flex: 1;
        width: 100%;
        overflow: hidden;
      }

      #mly-viewer {
        width: 100%;
        height: 100%;
        background-color: #000;
      }

      #ui-overlay {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 1000;
        pointer-events: none;
      }

      .status-pill {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
        padding: 8px 16px;
        border-radius: 999px;
        font-weight: 900;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: inline-block;
        pointer-events: auto;
      }

      #map-container {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 300px;
        height: 200px;
        background: var(--card-bg);
        border: 4px solid white;
        border-radius: 12px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        z-index: 1000;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #map-container:hover {
        width: 450px;
        height: 300px;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      #controls {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1001;
        display: flex;
        gap: 12px;
      }

      button {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      }

      button:hover {
        background-color: var(--primary-hover);
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      #results-modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(10px);
        z-index: 2000;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
      }

      .modal-card {
        background: var(--card-bg);
        padding: 40px;
        border-radius: 20px;
        max-width: 500px;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .result-title {
        font-size: 2.5rem;
        font-weight: 900;
        margin-bottom: 10px;
        font-style: italic;
      }

      .result-detail {
        color: #94a3b8;
        font-size: 1.1rem;
        margin-bottom: 30px;
      }

      .score-display {
        background: rgba(255, 255, 255, 0.05);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 30px;
      }

      .score-value {
        font-size: 3rem;
        font-weight: 900;
        color: #fbbf24;
      }

      #loading-overlay {
        position: absolute;
        inset: 0;
        background: var(--bg);
        z-index: 1002;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.3s ease;
      }

      .loader {
        width: 48px;
        height: 48px;
        border: 5px solid #FFF;
        border-bottom-color: var(--primary);
        border-radius: 50%;
        display: inline-block;
        box-sizing: border-box;
        animation: rotation 1s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes rotation {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="mly-viewer"></div>
      
      <div id="fallback-viewer" style="position: absolute; inset: 0; display: none; background: #000; z-index: 50; overflow: hidden; justify-content: center; align-items: center;">
        <img id="fallback-img" src="" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.8;">
        <div style="position: absolute; bottom: 40px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px; border: 1px solid #4f46e5; color: #fff; font-size: 0.9rem; font-weight: bold;">
          STREET-VIEW NICHT VERFÜGBAR - MOCK-MODUS AKTIV
        </div>
      </div>
      
      <div id="loading-overlay">
        <span class="loader"></span>
        <div style="font-weight: 900; letter-spacing: 0.2em; color: #64748b; font-size: 0.7rem; text-transform: uppercase;">Welt wird initialisiert...</div>
      </div>
      
      <div id="login-overlay" style="position: absolute; inset: 0; background: #0f172a; z-index: 3000; display: flex; justify-content: center; align-items: center; color: white;">
        <div class="modal-card" style="width: 100%; max-width: 400px; text-align: center;">
          <h1 style="font-size: 2rem; font-weight: 900; margin-bottom: 20px; color: #4f46e5;">GEOLATER</h1>
          <p style="color: #94a3b8; margin-bottom: 30px;">Gib deinen Namen ein, um die Weltreise zu beginnen.</p>
          <input type="text" id="player-name-input" placeholder="Dein Name..." style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; margin-bottom: 20px; outline: none; font-size: 1rem;">
          <button id="start-game-btn" style="width: 100%;">Spiel starten</button>
        </div>
      </div>

      <div id="ui-overlay">
        <div style="display: flex; flex-direction: column; gap: 5px;">
          <div class="status-pill"><span id="display-name" style="color: #4f46e5; font-weight: 800;">Gast</span></div>
          <div class="status-pill">Runde <span id="round-num">1</span>/5</div>
          <div class="status-pill">Punkte: <span id="total-score">0</span></div>
        </div>
      </div>

      <div id="debug-panel" style="position: absolute; bottom: 40px; left: 40px; background: rgba(0,0,0,0.95); padding: 30px; border-radius: 12px; font-family: monospace; font-size: 16px; z-index: 2000; border: 3px solid #4f46e5; pointer-events: none; width: 500px;">
        <div style="color: #4f46e5; font-weight: bold; margin-bottom: 12px; border-bottom: 2px solid #333; padding-bottom: 6px; font-size: 20px;">GEO-DEBUGGER (Strg + G)</div>
        <div id="debug-info" style="color: #ccc; margin-bottom: 12px;">Initialisiere...</div>
        <div style="color: #ef4444; font-weight: bold; margin-bottom: 6px;">SYSTEM-LOG:</div>
        <div id="debug-log" style="color: #888; height: 120px; overflow: hidden; line-height: 1.4; font-size: 14px;"></div>
        <button id="copy-debug-btn" style="margin-top: 15px; width: 100%; height: 40px; font-size: 14px; background: #1e293b; border: 1px solid #4f46e5; pointer-events: auto; color: white; cursor: pointer; border-radius: 6px;">Koordinaten kopieren</button>
      </div>

      <div id="map-container">
        <div id="map"></div>
      </div>

      <div id="controls">
        <button id="guess-btn" disabled>Tipp abgeben</button>
      </div>
    </div>

    <div id="results-modal">
      <div class="modal-card">
        <div class="result-title">Guter Versuch!</div>
        <p id="dist-text" class="result-detail">Du warst 1.234 km entfernt.</p>
        
        <div class="score-display">
          <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; color: #94a3b8; margin-bottom: 5px;">Erhaltene Punkte</div>
          <div id="round-score" class="score-value">0</div>
        </div>

        <button id="next-btn" style="width: 100%;">Nächste Runde</button>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
